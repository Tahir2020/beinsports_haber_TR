name: ♻️ beIN Sports Haber - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Deno kurulumu
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: 📦 yt-dlp kur
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

      - name: 🔧 Sürümleri kontrol et
        run: |
          yt-dlp --version
          deno --version
          which deno

      - name: 🍪 Cookies'i çöz
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt

          if [ ! -s cookies.txt ]; then
            echo "❌ cookies.txt boş!"
            exit 1
          fi

          echo "✅ Cookies yüklendi"

      - name: 🎬 M3U8 oluştur
        run: |
          python update_stream.py

      - name: ✅ M3U8 kontrol et
        run: |
          if [ ! -s Bein_Sports_Haberler.m3u8 ]; then
            echo "❌ Bein_Sports_Haberler.m3u8 oluşmadı!"
            ls -la
            exit 1
          fi

          echo "✅ M3U8 başarıyla oluşturuldu"
          cat Bein_Sports_Haberler.m3u8

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add Bein_Sports_Haberler.m3u8

          git diff --cached --quiet || git commit -m "🔄 Otomatik güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"

          git push
