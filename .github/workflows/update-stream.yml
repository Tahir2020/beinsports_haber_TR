name: beIN Sports Haber - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Kodu çek
      uses: actions/checkout@v4

    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 yt-dlp ve EJS (JavaScript Challenge) Kurulumu
      run: |
        pip install --upgrade pip
        pip install --upgrade yt-dlp
        pip install yt-dlp-ejs

    - name: 🍪 Cookies'i decode et
      run: |
        echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
        echo "✅ Cookies yüklendi"

    - name: 🎬 Stream URL al (Artık EJS çalışıyor olmalı)
      run: |
        # Web client deneniyor (artık bot engeli aşılacak)
        yt-dlp -g \
          --cookies cookies.txt \
          --extractor-args "youtube:player_client=web" \
          -f "best[height<=1080]" \
          https://www.youtube.com/embed/i7UpPgxfZZ8 > stream_url.txt

        echo "Stream URL: $(head -n 1 stream_url.txt | cut -c1-100)..."

    - name: 📝 M3U oluştur
      run: |
        STREAM_URL=$(cat stream_url.txt)
        cat > beinsports_haber.m3u <<EOF
        #EXTM3U
        #EXTINF:-1 tvg-id="beinsports.tr" tvg-name="beIN Sports Haber" tvg-logo="https://www.tvlogolar.xyz/europa/turkey/beinsportshaber.png" group-title="Bein Sports Haber",beIN Sports Haber
        $STREAM_URL
        EOF
        echo "✅ M3U dosyası oluşturuldu"

    - name: 📤 Değişiklikleri GitHub'a gönder
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stream_url.txt beinsports_haber.m3u
        git diff --cached --quiet || git commit -m "🔄 Otomatik güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
        git push
