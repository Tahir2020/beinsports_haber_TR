name: beIN Sports Haber - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Kodu çek
      uses: actions/checkout@v4
      
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 Node.js kurulumu (JavaScript runtime için)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: 📦 yt-dlp ve bağımlılıkları kur
      run: |
        pip install --upgrade pip
        pip install --upgrade yt-dlp
        npm install -g jsdom
        
    - name: 🎬 Akış bağlantısını al (Node.js ile)
      run: |
        node get_stream.js
        
    - name: 🔄 Python ile M3U oluştur
      run: |
        python create_m3u.py
