name: beIN Sports Haber - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Kodu çek
      uses: actions/checkout@v4
      
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 yt-dlp kurulumu
      run: |
        pip install --upgrade pip
        pip install --upgrade yt-dlp
        
    - name: 🍪 Cookies'i decode et
      run: |
        echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
        echo "✅ Cookies yüklendi"
        
    - name: 🎬 Stream URL al (web client ile)
      run: |
        # Önce web client dene (cookies destekler)
        yt-dlp -g \
          --cookies cookies.txt \
          --extractor-args "youtube:player_client=web" \
          -f "best[height<=1080]" \
          https://www.youtube.com/embed/i7UpPgxfZZ8 > stream_url.txt || true
          
        # Eğer boşsa, farklı client dene
        if [ ! -s stream_url.txt ]; then
          echo "Web client başarısız, chrome client deneniyor..."
          yt-dlp -g \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=chrome" \
            -f "best[height<=1080]" \
            https://www.youtube.com/embed/i7UpPgxfZZ8 > stream_url.txt || true
        fi
        
        # Hala boşsa, cookies'siz dene
        if [ ! -s stream_url.txt ]; then
          echo "Cookies'siz deneniyor..."
          yt-dlp -g \
            --extractor-args "youtube:player_client=android" \
            -f "best[height<=720]" \
            https://www.youtube.com/embed/i7UpPgxfZZ8 > stream_url.txt || true
        fi
        
    - name: 📝 M3U oluştur
      run: |
        if [ -s stream_url.txt ]; then
          STREAM_URL=$(cat stream_url.txt)
          echo "✅ Stream URL alındı: ${STREAM_URL:0:100}..."
          
          cat > beinsports_haber.m3u << EOF
          #EXTM3U
          #EXTINF:-1 tvg-id="beinsports.tr" tvg-name="beIN Sports Haber" tvg-logo="https://www.tvlogolar.xyz/europa/turkey/beinsportshaber.png" group-title="Bein Sports Haber",beIN Sports Haber
          $STREAM_URL
          EOF
        else
          echo "❌ Stream URL alınamadı, eski dosya korunuyor"
          exit 1
        fi
        
    - name: 📤 GitHub'a gönder
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stream_url.txt beinsports_haber.m3u
        git diff --cached --quiet || git commit -m "🔄 $(date '+%Y-%m-%d %H:%M:%S')"
        git push
