name: beIN Sports Haber - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Kodu çek
      uses: actions/checkout@v4
      
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 Gereksinimleri yükle
      run: |
        pip install --upgrade pip
        pip install yt-dlp
        
    - name: 🎬 Cache temizle ve yeni manifest oluştur
      run: |
        python update_stream.py
        
    - name: 📝 Değişiklikleri kontrol et
      id: check_changes
      run: |
        git status --porcelain
        if [[ -n $(git status --porcelain) ]]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "📊 Değişen dosyalar:"
          git status --porcelain
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ URL değişmemiş, güncelleme yapılmadı"
        fi
        
    - name: 📤 Değişiklikleri GitHub'a gönder
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Eski yedek dosyaları temizle (opsiyonel)
        git add cache/
        git add stream_url.txt beinsports_haber.m3u
        git add *.old --ignore-errors
        
        git commit -m "🔄 beIN Sports Haber güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
        git push
