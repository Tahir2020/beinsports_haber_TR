name: beIN Sports Haber - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Kodu çek
      uses: actions/checkout@v4
      
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 Deno (JavaScript Runtime) kurulumu
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.x
        
    - name: 📦 yt-dlp ve bağımlılıkları kur
      run: |
        pip install --upgrade pip
        pip install --upgrade yt-dlp
        pip install yt-dlp-ejs
        
    - name: 🔧 yt-dlp yapılandırması (EJS için)
      run: |
        mkdir -p ~/.config/yt-dlp
        # Deno'yu JavaScript runtime olarak ayarla
        echo "--js-runtimes deno" > ~/.config/yt-dlp/config
        echo "--remote-components ejs:npm" >> ~/.config/yt-dlp/config
        cat ~/.config/yt-dlp/config
        
    - name: 🍪 Cookies'i decode et
      run: |
        echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
        echo "✅ Cookies yüklendi"
        
    - name: 🎬 Stream URL al (JavaScript challenge çözülmüş olmalı)
      run: |
        yt-dlp -g \
          --cookies cookies.txt \
          -f "best[height<=1080]" \
          https://www.youtube.com/embed/i7UpPgxfZZ8 > stream_url.txt
        
        if [ -s stream_url.txt ]; then
          echo "✅ Stream URL alındı"
          echo "URL: $(head -n 1 stream_url.txt | cut -c1-100)..."
        else
          echo "❌ Stream URL alınamadı"
          exit 1
        fi
        
    - name: 📝 M3U oluştur
      run: |
        STREAM_URL=$(cat stream_url.txt)
        
        cat > beinsports_haber.m3u << 'EOF'
        #EXTM3U
        #EXTINF:-1 tvg-id="beinsports.tr" tvg-name="beIN Sports Haber" tvg-logo="https://www.tvlogolar.xyz/europa/turkey/beinsportshaber.png" group-title="Bein Sports Haber",beIN Sports Haber
        EOF
        echo "$STREAM_URL" >> beinsports_haber.m3u
        
        echo "✅ M3U dosyası oluşturuldu"
        cat beinsports_haber.m3u
        
    - name: 📤 GitHub'a gönder
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stream_url.txt beinsports_haber.m3u
        git diff --cached --quiet || git commit -m "🔄 $(date '+%Y-%m-%d %H:%M:%S')"
        git push
