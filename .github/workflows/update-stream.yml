name: beIN Sports Haber - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Kodu çek
      uses: actions/checkout@v4
      
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 yt-dlp kurulumu (en son sürüm)
      run: |
        pip install --upgrade pip
        pip install --upgrade yt-dlp
        
    - name: 🔧 yt-dlp test
      run: |
        yt-dlp --version
        
    - name: 🎬 Akış bağlantısını güncelle
      run: |
        python update_stream.py
      continue-on-error: false
      
    - name: 📝 Değişiklikleri kontrol et
      id: check_changes
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        
        git status --porcelain
        if [[ -n $(git status --porcelain) ]]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "📊 Değişen dosyalar:"
          git status --porcelain
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ URL değişmemiş veya hata oluştu"
        fi
        
    - name: 📤 Değişiklikleri GitHub'a gönder
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git add cache/ stream_url.txt beinsports_haber.m3u || true
        git add *.old --ignore-errors || true
        
        if [[ -n $(git status --porcelain) ]]; then
          git commit -m "🔄 beIN Sports Haber güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "Commit edilecek değişiklik yok"
        fi
